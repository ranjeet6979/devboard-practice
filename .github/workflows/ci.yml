name : ci

on:
  push:
    branches:
      - master

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name : checkout
              uses: actions/checkout@v7

            - name: setup node
              uses: actions/setup-node@v6
              with:
                node-version: 20
                cache: 'npm'
                cache-dependency-path: frontend/package-lock.json
